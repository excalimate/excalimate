name: Publish MCP Server

on:
  push:
    tags:
      - 'mcp-server-v*'
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (skip actual publish)'
        type: boolean
        default: true

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/mcp-server-v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/mcp-server-v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(node -p "require('./mcp-server/package.json').version")" >> $GITHUB_OUTPUT
          fi

      # Run web app tests first (MCP server depends on shared types)
      - name: Install web app dependencies
        run: npm ci

      - name: Test web app
        run: npx vitest run

      # Build MCP server
      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Type check
        working-directory: mcp-server
        run: npx tsc --noEmit

      - name: Build
        working-directory: mcp-server
        run: npx tsc

      - name: Verify build
        working-directory: mcp-server
        run: node -e "require('./dist/index.js'); console.log('Build verified'); process.exit(0)"

      - name: Run benchmarks
        working-directory: mcp-server
        run: npx tsx bench/run.ts --markdown --output bench-results.md

      # Publish
      - name: Publish to npm (dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry-run == 'true'
        working-directory: mcp-server
        run: npm publish --dry-run --access public

      - name: Publish to npm
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry-run != 'true'
        working-directory: mcp-server
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # Release
      - name: Extract changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Extracting changelog for version: $VERSION"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") || (ver == "" && index($0, "[Unreleased]"))) found=1
              next
            }
            found { print }
          ' mcp-server/CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{if(found) exit} found{print}' mcp-server/CHANGELOG.md > release-notes.md
          fi
          if [ -f mcp-server/bench-results.md ]; then
            echo "" >> release-notes.md
            echo "---" >> release-notes.md
            echo "" >> release-notes.md
            cat mcp-server/bench-results.md >> release-notes.md
          fi

      - name: Create tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mcp-server-v${{ steps.version.outputs.version }}
          name: 'MCP Server v${{ steps.version.outputs.version }}'
          body_path: release-notes.md
          files: |
            mcp-server/bench-results.md
