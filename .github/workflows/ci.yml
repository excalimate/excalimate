name: CI
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Detect which areas changed ─────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      mcp: ${{ steps.filter.outputs.mcp }}
      landing: ${{ steps.filter.outputs.landing }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - 'eslint.config.*'
              - 'index.html'
            mcp:
              - 'mcp-server/**'
            landing:
              - 'landing-page/**'

  # ── Web App ────────────────────────────────────────────────────
  app-lint-and-test:
    name: 'App: Lint, Type Check & Test'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Test
        run: npx vitest run

  app-build:
    name: 'App: Build'
    runs-on: ubuntu-latest
    needs: app-lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-app-dist
          path: dist/

  # ── MCP Server ─────────────────────────────────────────────────
  mcp-check:
    name: 'MCP: Type Check'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - working-directory: mcp-server
        run: npm ci
      - name: Type check
        working-directory: mcp-server
        run: npx tsc --noEmit

  mcp-build:
    name: 'MCP: Build'
    runs-on: ubuntu-latest
    needs: mcp-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - working-directory: mcp-server
        run: npm ci && npx tsc
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-server-dist
          path: mcp-server/dist/

  # ── Landing Page ───────────────────────────────────────────────
  landing-build:
    name: 'Landing: Build'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.landing == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: landing-page/package-lock.json
      - working-directory: landing-page
        run: npm ci
      - name: Build
        working-directory: landing-page
        run: npx astro build
      - uses: actions/upload-artifact@v4
        with:
          name: landing-page-dist
          path: landing-page/dist/
