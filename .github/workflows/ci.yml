name: CI
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Web app
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      # MCP server
      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Type check MCP server
        working-directory: mcp-server
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Build MCP server
        working-directory: mcp-server
        run: npm ci && npx tsc

      - name: Install landing page dependencies
        working-directory: landing-page
        run: npm ci

      - name: Build landing page
        working-directory: landing-page
        run: npx astro build

      - name: Upload web app artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app-dist
          path: dist/

      - name: Upload MCP server artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-server-dist
          path: mcp-server/dist/

      - name: Upload landing page artifact
        uses: actions/upload-artifact@v4
        with:
          name: landing-page-dist
          path: landing-page/dist/
