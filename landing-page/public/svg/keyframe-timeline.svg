<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" width="110" height="110">
  <!-- svg-source:excalidraw-style hand-drawn keyframe timeline icon -->
  <g stroke-linecap="round" fill-rule="evenodd">
    <!-- Timeline bar (horizontal) -->
    <path d="M12 58 C14 56, 22 55, 38 56 C54 57, 72 55, 88 56 C96 56.5, 99 57, 100 58"
      stroke="#1e1e1e" stroke-width="2.5" fill="none"/>
    <!-- Playhead line (vertical) -->
    <path d="M56 32 C55.5 38, 56.5 52, 56 78 C55.8 82, 56.2 84, 56 86"
      stroke="#1e1e1e" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
    <!-- Diamond keyframe 1 (left) -->
    <g transform="translate(28 54)">
      <path d="M0 -10 C1 -11, 3 -11, 10 0 C11 1, 11 3, 0 10 C-1 11, -3 11, -10 0 C-11 -1, -11 -3, 0 -10"
        fill="#f08c00" stroke="#1e1e1e" stroke-width="2"/>
    </g>
    <!-- Diamond keyframe 2 (center) -->
    <g transform="translate(56 54)">
      <path d="M0 -10 C2 -11, 4 -10, 10 0 C11 2, 10 4, 0 10 C-2 11, -4 10, -10 0 C-11 -2, -10 -4, 0 -10"
        fill="#ff6b6b" stroke="#1e1e1e" stroke-width="2"/>
    </g>
    <!-- Diamond keyframe 3 (right) -->
    <g transform="translate(82 54)">
      <path d="M0 -10 C1.5 -11, 3.5 -10.5, 10 0 C11 1.5, 10.5 3.5, 0 10 C-1.5 11, -3.5 10.5, -10 0 C-11 -1.5, -10.5 -3.5, 0 -10"
        fill="#d0bfff" stroke="#1e1e1e" stroke-width="2"/>
    </g>
    <!-- Track lines (horizontal, above and below) -->
    <path d="M14 38 C20 37, 50 38.5, 70 38 C82 37.5, 94 38, 98 38.5"
      stroke="#1e1e1e" stroke-width="1.5" fill="none" opacity="0.35"/>
    <path d="M14 74 C20 74.5, 48 73.5, 68 74 C80 74.5, 94 73.8, 98 74"
      stroke="#1e1e1e" stroke-width="1.5" fill="none" opacity="0.35"/>
    <!-- Small tick marks on bar -->
    <path d="M28 52 L28 48" stroke="#1e1e1e" stroke-width="1.5" opacity="0.4"/>
    <path d="M82 52 L82 48" stroke="#1e1e1e" stroke-width="1.5" opacity="0.4"/>
    <!-- Playhead triangle -->
    <path d="M50 28 C52 27, 54 26.5, 56 26 C58 26.5, 60 27, 62 28 C61 30, 59 32, 56 34 C53 32, 51 30, 50 28"
      fill="#ffa8a8" stroke="#1e1e1e" stroke-width="1.5"/>
  </g>
</svg>
